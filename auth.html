<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | CapeLoad Logistics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', Arial, sans-serif;
      background: #f7f5f2;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    :root {
      --orange: #f15f22;
      --orange-dark: #c44a18;
      --blue: #2b3990;
      --green: #22c55e;
      --red: #ef4444;
      --text-muted: #888;
    }
    a { text-decoration: none; color: inherit; }

    .logo { display: block; margin: 0 auto 32px; height: 168px; width: auto; }
    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 440px;
      margin: 24px;
    }
    h1 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: var(--text-muted); text-align: center; margin-bottom: 28px; }

    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      background: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .google-btn:hover { border-color: #aaa; }
    .google-btn svg { width: 20px; height: 20px; }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e5e5;
    }

    .tabs {
      display: flex;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 1px solid #eee;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #fff;
      border: none;
      color: var(--text-muted);
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--orange);
      color: #fff;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--orange); }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.85; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error { background: #fef2f2; color: var(--red); padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; margin-top: 12px; }
    .success { background: #f0fdf4; color: var(--green); padding: 10px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; margin-top: 12px; }

    .footer-links {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
    }
    .footer-links a {
      color: var(--orange);
      font-weight: 600;
    }
    .footer-links a:hover { text-decoration: underline; }
    .footer-links p { margin-bottom: 8px; }

    #name-field { display: none; }
    .loading { pointer-events: none; opacity: 0.6; }
  </style>
</head>
<body>

<div class="card" id="auth-card">
  <a href="index.html">
    <img src="images/logo dark.png" alt="CapeLoad" class="logo">
  </a>

  <h1 id="auth-title">Sign In</h1>
  <p class="subtitle" id="auth-subtitle">Track your bookings and manage deliveries.</p>

  <button class="google-btn" id="google-btn" onclick="googleSignIn()">
    <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09A6.97 6.97 0 015.48 12c0-.72.13-1.43.36-2.09V7.07H2.18A11.97 11.97 0 001 12c0 1.94.46 3.77 1.18 5.07l3.66-2.98z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Continue with Google
  </button>

  <div class="divider">or</div>

  <div class="tabs" id="tabs">
    <button class="tab active" onclick="switchMode('signin')">Sign In</button>
    <button class="tab" onclick="switchMode('signup')">Sign Up</button>
  </div>

  <form onsubmit="handleEmailAuth(event)">
    <div class="field" id="name-field">
      <label>Full Name</label>
      <input type="text" id="full-name" placeholder="e.g. Sipho Ndlovu">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters" required minlength="6">
    </div>
    <button type="submit" class="submit-btn" id="submit-btn">Sign In</button>
  </form>

  <div id="error-msg" style="display:none" class="error"></div>
  <div id="success-msg" style="display:none" class="success"></div>

  <div class="footer-links">
    <p><a href="driver-signup.html">Want to drive? Register your vehicle</a></p>
    <a href="index.html">Back to home</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script>
  var mode = 'signin';
  var redirectPage = new URLSearchParams(window.location.search).get('redirect') || '';

  // Check if already logged in
  (async function() {
    var user = await getCurrentUser();
    if (user) {
      var profile = await getUserProfile(user.id);
      redirectByRole(profile, user.email);
    }
  })();

  function redirectByRole(profile, email) {
    if (isAdminUser(profile, email)) {
      window.location.href = 'admin.html';
    } else if (profile && profile.role === 'driver') {
      window.location.href = 'driver-portal.html';
    } else {
      window.location.href = 'client-portal.html';
    }
  }

  function switchMode(m) {
    mode = m;
    var tabs = document.querySelectorAll('.tab');
    tabs[0].classList.toggle('active', m === 'signin');
    tabs[1].classList.toggle('active', m === 'signup');
    document.getElementById('name-field').style.display = m === 'signup' ? 'block' : 'none';
    document.getElementById('submit-btn').textContent = m === 'signin' ? 'Sign In' : 'Create Account';
    document.getElementById('auth-title').textContent = m === 'signin' ? 'Sign In' : 'Create Account';
    document.getElementById('auth-subtitle').textContent = m === 'signin'
      ? 'Track your bookings and manage deliveries.'
      : 'Get started with CapeLoad today.';
    hideMessages();
  }

  async function googleSignIn() {
    hideMessages();
    // Store redirect intent in cookie before OAuth redirect
    if (redirectPage) {
      document.cookie = 'auth_redirect=' + encodeURIComponent(redirectPage) + ';path=/;max-age=600;SameSite=Lax';
    }
    var { error } = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/auth.html'
      }
    });
    if (error) showError(error.message);
  }

  async function handleEmailAuth(e) {
    e.preventDefault();
    hideMessages();

    var email = document.getElementById('email').value;
    var password = document.getElementById('password').value;
    var fullName = document.getElementById('full-name').value;
    var btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Please wait...';

    try {
      if (mode === 'signup') {
        if (!fullName.trim()) { showError('Please enter your name.'); return; }
        var { data, error } = await sb.auth.signUp({
          email: email,
          password: password,
          options: { data: { full_name: fullName } }
        });
        if (error) throw error;
        if (data.user) {
          // Wait for trigger to create public.users row
          await new Promise(function(r) { setTimeout(r, 500); });
          showSuccess('Account created! Redirecting...');
          setTimeout(function() { window.location.href = 'client-portal.html'; }, 1000);
        }
      } else {
        var { data, error } = await sb.auth.signInWithPassword({ email: email, password: password });
        if (error) throw error;

        // Wait for session
        await new Promise(function(r) { setTimeout(r, 300); });
        var profile = await getUserProfile(data.user.id);
        redirectByRole(profile, data.user.email);
      }
    } catch (err) {
      showError(err.message || 'Authentication failed');
    } finally {
      btn.disabled = false;
      btn.textContent = mode === 'signin' ? 'Sign In' : 'Create Account';
    }
  }

  function showError(msg) {
    var el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }

  function showSuccess(msg) {
    var el = document.getElementById('success-msg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('error-msg').style.display = 'none';
  }

  function hideMessages() {
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }

  // Handle URL params for context
  if (redirectPage.includes('driver')) {
    document.getElementById('auth-title').textContent = 'Driver Login';
    document.getElementById('auth-subtitle').textContent = 'Access your fleet dashboard, jobs, and earnings.';
    // Hide signup tab for drivers (they register via driver-signup)
    document.getElementById('tabs').style.display = 'none';
  } else if (redirectPage.includes('admin')) {
    document.getElementById('auth-title').textContent = 'Admin Login';
    document.getElementById('auth-subtitle').textContent = 'Admin access only.';
    document.getElementById('tabs').style.display = 'none';
  }
</script>

</body>
</html>
